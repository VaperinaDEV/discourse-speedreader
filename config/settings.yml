plugins:
  speedreader_enabled:
    client: true
    default: true

  # Az olvasó induláskor ezzel a sebességgel indul, ha a felhasználónak
  # még nincs mentett preferenciája.
  speedreader_default_wpm:
    client: true
    default: 300
    min: 50
    max: 2000

  # A sebességcsúszka alsó / felső határa a felolvasóban.
  speedreader_min_wpm:
    client: true
    default: 100
    min: 50
    max: 1000

  speedreader_max_wpm:
    client: true
    default: 900
    min: 200
    max: 3000

  # Egy dokumentumból kinyerhető szavak maximális száma (védelem a
  # kirívóan nagy fájlok ellen).
  speedreader_max_words_per_book:
    client: true
    default: 400000
    min: 1000
    max: 3000000

  # Feltölthető PDF maximális mérete megabájtban.
  speedreader_max_upload_size_mb:
    client: true
    default: 80
    min: 1
    max: 500

  # Alapból "rövid szónak" számító, a következő szóval összevonható
  # kötőszók / névelők listája (a felolvasó "rövid szavak összevonása"
  # funkciójához). Nyelvenként/közösségenként testre szabható.
  speedreader_chunk_words:
    client: true
    type: list
    list_type: compact
    default: "a|az|és|s|de|ha|hogy|is|meg|nem|egy|e|ő|ők"
